services:
  homeassistant:
    container_name: toss_invest_dev_ha
    image: ghcr.io/home-assistant/home-assistant:2026.7.2
    volumes:
      - ./config/.storage:/config/.storage
      - ./configuration.yaml:/config/configuration.yaml:ro
      - ${TOSS_INVEST_DEV_SECRETS:-./secrets.yaml.example}:/config/secrets.yaml:ro
      - ../custom_components/toss_invest:/config/custom_components/toss_invest
    ports:
      - "8123:8123"
    healthcheck:
      test:
        - CMD
        - python3
        - -c
        - >-
          import urllib.request;
          urllib.request.urlopen('http://localhost:8123/', timeout=4).close()
      start_period: 30s
      interval: 10s
      timeout: 5s
      retries: 6
    restart: unless-stopped
