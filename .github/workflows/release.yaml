name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"
          cache: pip
      - run: python -m pip install -e ".[dev]" "homeassistant==2026.7.2"
      - run: |
          pytest -q
          ruff check .
          ruff format --check .
          mypy custom_components/toss_invest
      - name: Require tag and manifest versions to match
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: >-
          python .github/scripts/validate_release_tag.py
          "$RELEASE_TAG" custom_components/toss_invest/manifest.json
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: home-assistant/actions/hassfest@master
      - uses: hacs/action@main
        with:
          category: integration
          # Temporary for custom-repository development only. MUST remove this
          # ignore after official home-assistant/brands registration.
          ignore: brands
  publish:
    needs: [quality, validate]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"
      - name: Build the HACS archive
        run: >-
          python .github/scripts/build_release.py
          custom_components/toss_invest toss_invest.zip
      - name: Publish GitHub release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: toss_invest.zip
          generate_release_notes: true
