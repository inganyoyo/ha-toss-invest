name: Latest Home Assistant compatibility

on:
  schedule:
    - cron: "17 19 * * 0"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  latest-stable:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Test against latest stable Home Assistant
        run: |
          docker run --rm \
            -v "${GITHUB_WORKSPACE}:/work" \
            -w /work \
            ghcr.io/home-assistant/home-assistant:stable \
            bash -ceu '
              python -m venv --system-site-packages /tmp/toss-invest-test
              /tmp/toss-invest-test/bin/python -m pip install \
                pytest pytest-asyncio pytest-homeassistant-custom-component \
                aioresponses ruff mypy
              /tmp/toss-invest-test/bin/pytest -q
              /tmp/toss-invest-test/bin/ruff check .
              /tmp/toss-invest-test/bin/ruff format --check .
              /tmp/toss-invest-test/bin/mypy custom_components/toss_invest
            '
