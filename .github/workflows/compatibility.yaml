name: Latest Home Assistant compatibility

on:
  schedule:
    - cron: "17 19 * * 0"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  latest-stable:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Test against latest stable Home Assistant
        run: |
          docker run --rm \
            -v "${GITHUB_WORKSPACE}:/work" \
            -w /work \
            ghcr.io/home-assistant/home-assistant:stable \
            bash -ceu '
              STABLE_HA_VERSION="$(python -c "import importlib.metadata as m; print(m.version(\"homeassistant\"))")"
              printf "homeassistant==%s\n" "$STABLE_HA_VERSION" > /tmp/stable-ha-constraint.txt
              python -m venv --system-site-packages /tmp/toss-invest-test
              /tmp/toss-invest-test/bin/python -m pip install \
                --constraint /tmp/stable-ha-constraint.txt \
                pytest==9.0.3 pytest-asyncio==1.4.0 \
                pytest-homeassistant-custom-component==0.13.346 \
                aioresponses==0.7.9 ruff==0.15.21 mypy==2.3.0
              INSTALLED_HA_VERSION="$(/tmp/toss-invest-test/bin/python -c "import importlib.metadata as m; print(m.version(\"homeassistant\"))")"
              if [ "$INSTALLED_HA_VERSION" != "$STABLE_HA_VERSION" ]; then
                echo "installed Home Assistant changed during test-tool setup" >&2
                exit 1
              fi
              /tmp/toss-invest-test/bin/pytest -q
              /tmp/toss-invest-test/bin/ruff check .
              /tmp/toss-invest-test/bin/ruff format --check .
              /tmp/toss-invest-test/bin/mypy custom_components/toss_invest
            '
