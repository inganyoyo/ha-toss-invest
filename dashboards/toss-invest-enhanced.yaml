views:
  - title: Toss 주식
    path: toss-invest
    icon: mdi:chart-line
    type: panel
    cards:
      - type: custom:layout-card
        layout_type: custom:grid-layout
        layout:
          grid-template-columns: repeat(2, minmax(0, 1fr))
          grid-template-areas: |
            "summary allocation"
            "holdings detail"
            "market risk"
          grid-gap: 16px
          mediaquery:
            "(max-width: 600px)":
              grid-template-columns: 1fr
              grid-template-areas: |
                "summary"
                "allocation"
                "holdings"
                "detail"
                "market"
                "risk"
        cards:
          - type: vertical-stack
            view_layout:
              grid-area: summary
            cards:
              - type: heading
                heading: 요약
                icon: mdi:wallet-outline
              - type: horizontal-stack
                cards:
                  - type: custom:button-card
                    entity: switch.toss_invest_portfolio_privacy_mode
                    name: 금액 가리기
                    icon: mdi:eye-off
                    tap_action:
                      action: toggle
                    styles:
                      card:
                        - background: var(--card-background-color)
                        - color: var(--primary-text-color)
                        - border: 1px solid var(--divider-color)
                        - border-radius: 18px
                  - type: custom:button-card
                    entity: button.toss_invest_portfolio_refresh
                    name: 새로고침
                    icon: mdi:refresh
                    tap_action:
                      action: call-service
                      service: button.press
                      target:
                        entity_id: button.toss_invest_portfolio_refresh
                    styles:
                      card:
                        - background: var(--card-background-color)
                        - color: var(--primary-text-color)
                        - border: 1px solid var(--divider-color)
                        - border-radius: 18px
              - type: horizontal-stack
                cards:
                  - type: custom:button-card
                    entity: sensor.toss_invest_portfolio_market_value_krw
                    name: 평가 금액
                    show_state: false
                    show_label: true
                    label: >-
                      [[[ const hidden = states['switch.toss_invest_portfolio_privacy_mode'].state !== 'off';
                      return hidden ? '••••' : `${entity.state} ${entity.attributes.unit_of_measurement || ''}`; ]]]
                    styles:
                      card:
                        - background: var(--card-background-color)
                        - color: var(--primary-text-color)
                        - border: 1px solid var(--divider-color)
                        - border-radius: 18px
                  - type: custom:button-card
                    entity: sensor.toss_invest_portfolio_daily_return
                    name: 오늘 수익률
                    show_state: true
                    state:
                      - operator: ">"
                        value: 0
                        color: var(--toss-gain-color, #d32f2f)
                      - operator: "<"
                        value: 0
                        color: var(--toss-loss-color, #1565c0)
                    styles:
                      card:
                        - background: var(--card-background-color)
                        - color: var(--primary-text-color)
                        - border: 1px solid var(--divider-color)
                        - border-radius: 18px
              - type: markdown
                content: >-
                  금액 가리기는 화면 템플릿일 뿐 **권한 경계**가 아닙니다. 개발자 도구와
                  엔티티 기록에서는 원본 금액을 볼 수 있습니다.

          - type: vertical-stack
            view_layout:
              grid-area: allocation
            cards:
              - type: heading
                heading: 배분
                icon: mdi:chart-donut
              - type: custom:apexcharts-card
                chart_type: donut
                header:
                  show: true
                  title: 국가 배분
                  colorize_states: true
                apex_config:
                  chart:
                    background: transparent
                  legend:
                    labels:
                      colors: var(--primary-text-color)
                series:
                  - entity: sensor.toss_invest_portfolio_allocation_kr
                    name: 한국
                  - entity: sensor.toss_invest_portfolio_allocation_us
                    name: 미국
              - type: entities
                entities:
                  - sensor.toss_invest_portfolio_allocation_krw
                  - sensor.toss_invest_portfolio_allocation_usd
                  - sensor.toss_invest_portfolio_top_one_concentration
                  - sensor.toss_invest_portfolio_top_three_concentration

          - type: vertical-stack
            view_layout:
              grid-area: holdings
            cards:
              - type: heading
                heading: 보유 종목
                icon: mdi:briefcase-outline
              - type: custom:auto-entities
                show_empty: false
                card:
                  type: custom:layout-card
                  layout_type: custom:grid-layout
                  layout:
                    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr))
                card_param: cards
                filter:
                  include:
                    - integration: toss_invest
                      domain: sensor
                      entity_id: sensor.*_market_value
                      options:
                        type: custom:button-card
                        show_state: false
                        show_label: true
                        label: >-
                          [[[ const hidden = states['switch.toss_invest_portfolio_privacy_mode'].state !== 'off';
                          return hidden ? '••••' : `${entity.state} ${entity.attributes.unit_of_measurement || ''}`; ]]]
                        styles:
                          card:
                            - background: var(--card-background-color)
                            - color: var(--primary-text-color)
                            - border: 1px solid var(--divider-color)
                            - border-radius: 18px
                sort:
                  method: name

          - type: vertical-stack
            view_layout:
              grid-area: detail
            cards:
              - type: heading
                heading: 선택 종목 상세
                icon: mdi:chart-timeline-variant
              - type: custom:auto-entities
                show_empty: false
                card:
                  type: entities
                  title: 활성 종목 현재가
                filter:
                  include:
                    - integration: toss_invest
                      domain: sensor
                      entity_id: sensor.*_current_price
                      options:
                        secondary_info: last-changed
                sort:
                  method: name
              - type: markdown
                content: >-
                  종목을 눌러 상세 기록을 확인하세요. 기간 수익률·고가/저가·낙폭·변동성은
                  선택적으로 활성화하는 엔티티입니다.

          - type: vertical-stack
            view_layout:
              grid-area: market
            cards:
              - type: heading
                heading: 시장 맥락
                icon: mdi:earth
              - type: entities
                entities:
                  - sensor.toss_invest_portfolio_kr_market_status
                  - sensor.toss_invest_portfolio_us_market_status
                  - sensor.toss_invest_portfolio_krw_usd_exchange_rate
              - type: custom:auto-entities
                show_empty: false
                card:
                  type: entities
                  title: 선택 데이터
                filter:
                  include:
                    - integration: toss_invest
                      domain: sensor
                      entity_id: sensor.toss_invest_portfolio_*buying_power

          - type: vertical-stack
            view_layout:
              grid-area: risk
            cards:
              - type: heading
                heading: 위험 및 알림
                icon: mdi:shield-alert-outline
              - type: entities
                entities:
                  - sensor.toss_invest_portfolio_api_health
                  - sensor.toss_invest_portfolio_data_freshness
                  - event.toss_invest_portfolio_alert
              - type: custom:auto-entities
                show_empty: false
                card:
                  type: entities
                  title: 종목 경고
                filter:
                  include:
                    - integration: toss_invest
                      domain: binary_sensor
                      entity_id: binary_sensor.*_warning
                sort:
                  method: name
