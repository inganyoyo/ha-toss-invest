views:
  - title: Toss 주식
    path: toss-invest
    icon: mdi:chart-line
    type: sections
    max_columns: 2
    sections:
      - type: grid
        title: 요약
        cards:
          - type: tile
            entity: switch.toss_invest_portfolio_privacy_mode
            name: 금액 가리기
            icon: mdi:eye-off
          - type: conditional
            conditions:
              - condition: state
                entity: button.toss_invest_portfolio_refresh
                state_not: unavailable
              - condition: state
                entity: button.toss_invest_portfolio_refresh
                state_not: unknown
            card:
              type: tile
              entity: button.toss_invest_portfolio_refresh
              name: 새로고침
              icon: mdi:refresh
          - type: conditional
            conditions:
              - condition: state
                entity: switch.toss_invest_portfolio_privacy_mode
                state: "on"
            card:
              type: markdown
              content: "모든 금액과 가격을 **••••** 처리했습니다. 수익률과 배분 비율은 계속 표시됩니다."
          - type: conditional
            conditions:
              - condition: state
                entity: switch.toss_invest_portfolio_privacy_mode
                state: "off"
            card:
              type: entities
              title: 포트폴리오 금액
              entities:
                - entity: sensor.toss_invest_portfolio_market_value_krw
                  name: 평가 금액 (KRW)
                - entity: sensor.toss_invest_portfolio_daily_profit_loss_krw
                  name: 오늘 손익 (KRW)
                - entity: sensor.toss_invest_portfolio_profit_loss_after_cost_krw
                  name: 총 손익 · 비용 반영 (KRW)
          - type: entities
            title: 수익률 · 시장 · 갱신
            entities:
              - entity: sensor.toss_invest_portfolio_daily_return
                name: 오늘 수익률 (%)
              - entity: sensor.toss_invest_portfolio_total_return_after_cost
                name: 총 수익률 · 비용 반영 (%)
              - entity: sensor.toss_invest_portfolio_kr_market_status
                name: 한국 시장
              - entity: sensor.toss_invest_portfolio_us_market_status
                name: 미국 시장
              - entity: sensor.toss_invest_portfolio_data_freshness
                name: 최근 갱신

      - type: grid
        title: 배분
        cards:
          - type: entities
            entities:
              - sensor.toss_invest_portfolio_allocation_kr
              - sensor.toss_invest_portfolio_allocation_us
              - sensor.toss_invest_portfolio_allocation_krw
              - sensor.toss_invest_portfolio_allocation_usd
              - sensor.toss_invest_portfolio_top_one_concentration
              - sensor.toss_invest_portfolio_top_three_concentration

      - type: grid
        title: 보유 종목
        cards:
          - type: markdown
            content: >-
              기본 카드만 사용하는 버전입니다. `sensor.<종목 이름>_daily_return`과
              `sensor.<종목 이름>_total_return_after_cost`처럼 금액이 아닌 수익률 엔티티는
              직접 추가할 수 있습니다. 현재가·평가금액은 아래 개인정보 보호 원칙에 따라
              반드시 금액 가리기 `off` 조건부 카드 안에 추가하세요.

      - type: grid
        title: 선택 종목 상세
        cards:
          - type: markdown
            content: >-
              기본 카드에는 동적 선택 차트가 없습니다. 원하는 종목의 기간 수익률·낙폭·변동성
              엔티티를 활성화해 추가하거나, 자동 일봉 차트가 포함된 enhanced 예제를 사용하세요.

      - type: grid
        title: 시장 맥락
        cards:
          - type: entities
            title: 지수
            entities:
              - sensor.toss_invest_portfolio_market_indicator_kospi
              - sensor.toss_invest_portfolio_market_indicator_kosdaq
          - type: conditional
            conditions:
              - condition: state
                entity: switch.toss_invest_portfolio_privacy_mode
                state: "off"
            card:
              type: entities
              title: 투자자 순매수 (KRW)
              entities:
                - sensor.toss_invest_portfolio_kospi_individual_net
                - sensor.toss_invest_portfolio_kospi_foreigner_net
                - sensor.toss_invest_portfolio_kospi_institution_net
                - sensor.toss_invest_portfolio_kospi_other_corporation_net
                - sensor.toss_invest_portfolio_kosdaq_individual_net
                - sensor.toss_invest_portfolio_kosdaq_foreigner_net
                - sensor.toss_invest_portfolio_kosdaq_institution_net
                - sensor.toss_invest_portfolio_kosdaq_other_corporation_net
          - type: conditional
            conditions:
              - condition: state
                entity: switch.toss_invest_portfolio_privacy_mode
                state: "off"
              - condition: state
                entity: sensor.toss_invest_portfolio_krw_buying_power
                state_not: unavailable
              - condition: state
                entity: sensor.toss_invest_portfolio_krw_buying_power
                state_not: unknown
            card:
              type: entity
              entity: sensor.toss_invest_portfolio_krw_buying_power
              name: 원화 주문 가능 금액
          - type: conditional
            conditions:
              - condition: state
                entity: switch.toss_invest_portfolio_privacy_mode
                state: "off"
              - condition: state
                entity: sensor.toss_invest_portfolio_usd_buying_power
                state_not: unavailable
              - condition: state
                entity: sensor.toss_invest_portfolio_usd_buying_power
                state_not: unknown
            card:
              type: entity
              entity: sensor.toss_invest_portfolio_usd_buying_power
              name: 달러 주문 가능 금액
          - type: markdown
            content: "선택 옵션 엔티티가 없으면 카드도 숨겨집니다. 채권 지표와 순위는 필요한 엔티티만 활성화해 추가하세요."

      - type: grid
        title: 위험 및 알림
        cards:
          - type: entities
            entities:
              - sensor.toss_invest_portfolio_api_health
              - sensor.toss_invest_portfolio_data_freshness
              - event.toss_invest_portfolio_alert
          - type: markdown
            content: >-
              알림 임계값은 통합 옵션에서 설정합니다. 종목별 활성 경고를 자동으로 모으려면
              enhanced 예제를, 알림 전송에는 번들 블루프린트를 사용하세요.
